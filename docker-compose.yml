version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kb_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js dashboard. Runs standalone in demo mode (bundled sample data) even
  # with no API; point NEXT_PUBLIC_API_URL at the FastAPI backend to go live.
  web:
    build:
      context: ./apps/web
      target: dev
    container_name: kb_web
    ports:
      - "3000:3000"
    environment:
      # Reach a backend running on the host from inside the container.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://host.docker.internal:8000}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  redisdata:
